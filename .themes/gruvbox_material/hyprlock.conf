input-field {
    monitor =
    size = 450, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(ebdbb2ee)
    inner_color = rgba(282828ee)
    font_color =  rgba(ebdbb2ee)
    font_family = JetBrains Mono Nerd Font
    fade_on_empty = false
    rounding = -1
    check_color = rgba(d3869bee)
    fail_color = rgba(ea6962ee)
    fail_text = that ain't it :(
    placeholder_text = enter secret
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

label {
  monitor =
  text = cmd[update:60000] echo "$(date +"%A, %Y-%m-%d")"
  color = rgba(ebdbb2ee)
  font_size = 20
  font_family = JetBrains Mono Nerd Font
  position = 0, 300
  halign = center
  valign = center
}

