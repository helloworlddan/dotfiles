[General]
# --- Colors (Gruvbox Material Dark Hard) ---
# Main background color
background_color="#282828"

# Main text color (Cream)
foreground_color="#ebdbb2"

# Input background color (Darker grey)
input_background="#32302f"

# Card/Panel background color (Slightly lighter dark grey)
card_background="#1d2021"

# Subtle border color (Warm grey)
border_color="#504945"

# Focus/Accent border color (Vibrant Green)
accent_color="#a9b665"

# Danger/Error color (Vibrant Red)
error_color="#ea6962"

# Warning color (Vibrant Yellow/Orange)
warning_color="#e78a4e"

# Info/Secondary color (Slightly muted Cyan/Blue)
info_color="#7daea3"

# Muted text color (Medium grey)
muted_color="#7c6764"

# Highlight color (Lighter grey)
highlight_color="#d4be98"


# --- Background Image ---
# To use a background image, place it in this directory (e.g. background.png)
# and set the path below. If empty, the solid background_color is used.
background_image=default.jpg


# --- Typography ---
# The font family used across the theme. Falls back to system sans-serif if not found.
font_family="JetBrains Mono Nerd Font"


# --- Interface Translations & Text ---
# Text placeholders and labels
username_placeholder="Username"
password_placeholder="Password"
session_label="Session:"
login_button_text="Login"
login_failed_text="Authentication failed"
