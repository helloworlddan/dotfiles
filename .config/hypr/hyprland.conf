################
### MONITORS ###
################

monitor =,preferred,auto,auto

# TODO: find ways to comfortably switch between profiles

# Office
monitor = eDP-1, 1920x1200@60, 3840x0, 1
monitor = DP-1,  3840x2160@60, 0x0, 1.0666

# Home
# monitor = eDP-1, 1920x1200@60, 2560x0, 1
# monitor = DP-1,  2560x1440@60, 0x0, 1



##################
### WORKSPACES ###
##################

$ws_bsh  = 1
$ws_vim  = 2
$ws_doc  = 3
$ws_gcp  = 4
$ws_add  = 5
$ws_web  = 6
$ws_mail = 7
$ws_cal  = 8
$ws_not  = 9
$ws_gvc  = 10
$ws_pers = 11
$ws_ext  = 12

$wsk_bsh  = B
$wsk_vim  = V
$wsk_doc  = D
$wsk_gcp  = G
$wsk_add  = A
$wsk_web  = W
$wsk_mail = M
$wsk_cal  = C
$wsk_not  = N
$wsk_gvc  = Z
$wsk_pers = P
$wsk_ext  = X

#######################
### CHROME PROFILES ###
#######################

$cp          = 1
$cp_argolis  = 2
$cp_personal = 3

#################
### LAUNCHERS ###
#################

$hypr_reload      = hyprctl reload
$wall             = swaybg -i .wall/default.jpg
$terminal         = foot
$editor           = foot -T editor bash -c 'nvim && bash'
$filemanager      = foot -T filemanager ranger
$corne            = foot -T corne -H cat Code/github.com/helloworlddan/corne/layout.txt
$switch_main      = foot bash -c 'source .bashrc && hswitchscreen main'
$switch_external  = foot bash -c 'source .bashrc && hswitchscreen external'
$screenlock       = swaylock
$menu             = wofi --show drun
$screenshot_clip  = grim -g "$(slurp)" - | wl-copy
$screenshot_file  = grim -g "$(slurp)" ~/shot-$(date +'%s').png
$browser          = goto -p $cp
$browser_argolis  = goto -p $cp_argolis
$browser_personal = goto -p $cp_personal
$mail             = goto -p $cp -g mail
$mail_new         = goto -p $cp -u mail.google.com/mail/?view=cm&fs=1&tf=1
$calendar         = goto -p $cp -g calendar
$meet             = goto -p $cp -g meet
$cloud            = goto -p $cp -g console.cloud 
$cloud_argolis    = goto -p $cp_argolis -g console.cloud 
$cloud_personal   = goto -p $cp_personal -g console.cloud 
$godocs           = goto -p $cp -u pkg.go.dev
$sparkplug        = goto -p $cp nucleus:sparkplug
$slack            = goto -p $cp -u app.slack.com/client/
$excalidraw       = goto -p $cp -u excalidraw.com

####################
### WINDOW RULES ###
####################

windowrule = workspace $ws_vim silent,  initialTitle:(editor)
windowrule = workspace $ws_doc silent,  class:(chrome-pkg.go.dev__-Profile)(.*)
windowrule = workspace $ws_gcp silent,  class:(chrome-console.cloud.google.com__-Profile)(.*)
windowrule = workspace $ws_add silent,  class:(chrome-excalidraw.com__-Profile).(.*)
windowrule = workspace $ws_add silent,  class:(chrome-app.slack.com__client_-Profile).(.*)
windowrule = workspace $ws_add silent,  class:(gimp)
windowrule = workspace $ws_web silent,  class:(browser_corp)
windowrule = workspace $ws_mail silent, class:(chrome-mail.google.com__-Profile)(.*)
windowrule = workspace $ws_cal silent,  class:(chrome-calendar.google.com__-Profile)(.*)
windowrule = workspace $ws_not silent,  class:(chrome-go__nucleus_sparkplug-Profile).(.*)
windowrule = workspace $ws_gvc silent,  class:(chrome-go__companion-Profile)(.*)
windowrule = workspace $ws_gvc silent,  class:(chrome-meet.google.com__-Profile)(.*)
windowrule = workspace $ws_pers silent, class:(browser_pers)

windowrule = float, center, size 820 480, initialTitle:(corne)

#################
### AUTOSTART ###
#################

exec-once = $wall
exec-once = waybar
exec-once = [workspace $ws_vim  silent]  $editor
exec-once = [workspace $ws_doc  silent]  $godocs
exec-once = [workspace $ws_gcp  silent]  $cloud
exec-once = [workspace $ws_add  silent]  $cloud_argolis
exec-once = [workspace $ws_web  silent]  $browser
exec-once = [workspace $ws_mail silent]  $mail
exec-once = [workspace $ws_cal  silent]  $calendar
exec-once = [workspace $ws_gvc  silent]  $meet
exec-once = [workspace $ws_pers silent]  $browser_personal

###################
### KEYBINDINGS ###
###################

$mainMod = ALT

bind = $mainMod      , F, fullscreen, # fullscreen
bind = $mainMod SHIFT, F, togglefloating, # floating
bind = $mainMod      , T, togglesplit, # flip H/V split
bind = $mainMod SHIFT, T, pseudo, # pseudo tiling
bind = $mainMod SHIFT, Q, killactive, # kill node
bind = $mainMod SHIFT, R, exec, $hypr_reload
bind = $mainMod SHIFT, Escape, exit, # kill WM
bind = $mainMod SHIFT, I, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 + 0.5}') # Zoom in
bind = $mainMod SHIFT, O, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 - 0.5}') # Zoom in

bind = $mainMod      , Escape, exec, $screenlock
bind = $mainMod      , Return, exec, $terminal
bind = $mainMod      , E, exec, $filemanager
bind = $mainMod      , R, exec, $menu
bind = $mainMod      , Backspace, exec, $corne
bind = $mainMod      , Comma, exec, $screenshot_clip
bind = $mainMod SHIFT, Comma, exec, $screenshot_file
bind = $mainMod      , Period, exec, $switch_main
bind = $mainMod SHIFT, Period, exec, $switch_external

bind = $mainMod      , S, exec, $slack
bind = $mainMod SUPER, M, exec, $mail_new

# Move focus
bind = $mainMod, L, movefocus, r
bind = $mainMod, H, movefocus, l
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move window
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Cycle monitor focus
bind = $mainMod      , Tab, focusmonitor, +1
bind = $mainMod SHIFT, Tab, movewindow, mon:+1

# Switch workspaces
bind = $mainMod, $wsk_bsh , workspace, $ws_bsh
bind = $mainMod, $wsk_vim , workspace, $ws_vim
bind = $mainMod, $wsk_doc , workspace, $ws_doc
bind = $mainMod, $wsk_gcp , workspace, $ws_gcp
bind = $mainMod, $wsk_add , workspace, $ws_add
bind = $mainMod, $wsk_web , workspace, $ws_web
bind = $mainMod, $wsk_mail, workspace, $ws_mail
bind = $mainMod, $wsk_cal , workspace, $ws_cal
bind = $mainMod, $wsk_not , workspace, $ws_not
bind = $mainMod, $wsk_gvc , workspace, $ws_gvc
bind = $mainMod, $wsk_pers, workspace, $ws_pers
bind = $mainMod, $wsk_ext , workspace, $ws_ext

# Move active window to a workspace
bind = $mainMod SHIFT, $wsk_bsh , movetoworkspacesilent, $ws_bsh
bind = $mainMod SHIFT, $wsk_vim , movetoworkspacesilent, $ws_vim
bind = $mainMod SHIFT, $wsk_doc , movetoworkspacesilent, $ws_doc
bind = $mainMod SHIFT, $wsk_gcp , movetoworkspacesilent, $ws_gcp
bind = $mainMod SHIFT, $wsk_add , movetoworkspacesilent, $ws_add
bind = $mainMod SHIFT, $wsk_web , movetoworkspacesilent, $ws_web
bind = $mainMod SHIFT, $wsk_mail, movetoworkspacesilent, $ws_mail
bind = $mainMod SHIFT, $wsk_cal , movetoworkspacesilent, $ws_cal
bind = $mainMod SHIFT, $wsk_not , movetoworkspacesilent, $ws_not
bind = $mainMod SHIFT, $wsk_gvc , movetoworkspacesilent, $ws_gvc
bind = $mainMod SHIFT, $wsk_pers, movetoworkspacesilent, $ws_pers
bind = $mainMod SHIFT, $wsk_ext , movetoworkspacesilent, $ws_ext

# Example special workspace (scratchpad)
bind = $mainMod, Space, togglespecialworkspace, magic
bind = $mainMod SHIFT, Space, movetoworkspace, special:magic

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 1%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindel = ,XF86AudioMute, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0%
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    repeat_rate = 25
    repeat_delay = 220

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

cursor {
    inactive_timeout = 1
    hide_on_key_press = true
}

gesture = 3, horizontal, workspace

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 5
    float_gaps = 5
    border_size = 1
    col.active_border = rgba(f5f5f5ee)
    col.inactive_border = rgba(121212aa)
    layout = dwindle
    snap {
      enabled = true
      respect_gaps = true
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    background_color = rgba(232323ee)
    font_family = "JetBrains Mono Nerd Font"
    focus_on_activate = true
    disable_hyprland_guiutils_check = true
}

decoration {
    rounding = 1
    rounding_power = 2

    # active_opacity = 1.0
    active_opacity = 0.9

    inactive_opacity = 0.8
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    # --- CUSTOM BEZIER CURVES ---
    # The "Overshot" gives that bouncy, rubber-band effect
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    # Smooth but fast deceleration
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    # Snappy for quick transitions
    bezier = snappy, 0.1, 1, 0, 1

    # --- WINDOW ANIMATIONS ---
    # Windows bounce in and shrink away
    animation = windows, 1, 5, overshot, slide
    animation = windowsIn, 1, 4, overshot, popin 70%
    animation = windowsOut, 1, 4, smoothOut, popin 80%
    animation = windowsMove, 1, 4, overshot

    # --- BORDER & FADE ---
    # Slow down the border for a "breathing" effect
    animation = border, 1, 10, default
    animation = borderangle, 1, 50, snappy, loop # Rotates border colors
    animation = fade, 1, 4, smoothIn
    animation = fadeIn, 1, 3, snappy
    animation = fadeOut, 1, 3, snappy

    # --- LAYER ANIMATIONS (Waybar, Rofi, Notifications) ---
    # This makes menus "slide" from the edges or "pop" into view
    animation = layers, 1, 4, overshot, fade
    animation = layersIn, 1, 3, overshot, slide top
    animation = layersOut, 1, 3, smoothOut, slide top

    # --- WORKSPACE ANIMATIONS ---
    # High-energy sliding between workspaces
    animation = workspaces, 1, 5, overshot, slide
    animation = workspacesIn, 1, 5, overshot, slide
    animation = workspacesOut, 1, 5, overshot, slide
 
    # --- SPECIAL EFFECTS ---
    # Makes the zoom tool feel like a physical camera lens
    animation = zoomFactor, 1, 5, overshot
}

